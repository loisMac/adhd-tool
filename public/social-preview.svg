<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Calm Space social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe8"/>
      <stop offset="100%" stop-color="#edf4ef"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8dfd1"/>
      <stop offset="100%" stop-color="#d8e5df"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="30" fill="#fdf9f4" stroke="#ddd5c9"/>

  <text x="120" y="190" font-family="Manrope, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#8b7355" letter-spacing="3">CALM SPACE</text>
  <text x="120" y="275" font-family="Manrope, Segoe UI, sans-serif" font-size="64" font-weight="800" fill="#3b342b">ADHD-Friendly Tools</text>
  <text x="120" y="340" font-family="Manrope, Segoe UI, sans-serif" font-size="64" font-weight="800" fill="#3b342b">for Focus and Daily Life</text>
  <text x="120" y="405" font-family="Manrope, Segoe UI, sans-serif" font-size="30" font-weight="500" fill="#5a5145">Task splitter, timers, reminders, planning, and gentle routines.</text>

  <rect x="120" y="450" width="250" height="52" rx="26" fill="url(#pill)"/>
  <text x="165" y="484" font-family="Manrope, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#44635c">Neurodivergent-first</text>

  <circle cx="970" cy="190" r="66" fill="#d8e5df"/>
  <circle cx="1045" cy="250" r="38" fill="#e8dfd1"/>
  <circle cx="930" cy="285" r="32" fill="#d5e1f0"/>
</svg>
